<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - AI Disaster Response</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
</head>
<body>
    <div class="app-container">
        <!-- 1. HERO SECTION -->
        <header class="hero-section">
            <h1>🚨 AI-Powered Disaster Alert System Saving Lives in Real-Time</h1>
            <p>🌍 Global monitoring, prediction, and emergency guidance</p>
        </header>

        <!-- 2. CITY SELECTOR -->
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="city-search" placeholder="🔍 Search your city............." autocomplete="off">
                <div id="city-suggestions" class="suggestions-box hidden"></div>
            </div>
            <button class="auto-btn" onclick="autoDetectLocation()">🎯 Detect My Location</button>
        </div>

        <!-- 3. MAIN LAYOUT -->
        <div class="main-layout">
            <!-- LEFT: MAP (70%) -->
            <div class="map-column relative-container glass-panel">
                <div id="map"></div>
                
                <!-- Floating Simulation Buttons -->
                <div class="sim-buttons-overlay">
                    <button onclick="simulateEvent('earthquake')" class="sim-btn eq-btn">🔴 Simulate Earthquake</button>
                    <button onclick="simulateEvent('flood')" class="sim-btn fl-btn">🔵 Simulate Flood</button>
                    <button onclick="simulateEvent('cyclone')" class="sim-btn cy-btn">🟡 Simulate Cyclone</button>
                </div>

                <!-- Floating City Status Popup -->
                <div id="city-status-popup" class="city-status-popup hidden">
                    <!-- Dynamic content injected by JS -->
                </div>
            </div>

            <!-- RIGHT: INFO PANEL (30%) -->
            <div class="info-column">
                <!-- C. SAFE ZONE FINDER -->
                <div class="info-panel glass-panel hidden" id="safe-zone-panel" style="flex:1; border: 2px solid var(--blue); position: relative; overflow: visible;">
                    <div class="glow-bg"></div>
                    <h2>🧭 Nearest Safe Zone</h2>
                    <div id="safe-zone-content">
                        <div style="color: var(--text-sec); padding: 10px;">Waiting for event...</div>
                    </div>
                </div>

                <!-- A. AI FUTURE PREDICTIONS -->
                <div class="info-panel glass-panel" style="flex:1;">
                    <h2>📢 AI Future Predictions</h2>
                    <div class="news-feed" id="news-feed"></div>
                </div>

                <!-- B. LIVE EMERGENCY FEED -->
                <div class="info-panel glass-panel" style="flex:1;">
                    <h2>🚨 Live Emergency Feed</h2>
                    <div class="alert-feed" id="alert-feed"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- GLOBAL WARNING OVERLAY (For WOW Simulation) -->
    <div id="global-warning-overlay" class="global-warning-overlay hidden">
        <div class="warning-box">
            <span class="icon">⚠️</span>
            <h2 id="global-warning-title">⚠️ Exteme Risk Detected</h2>
            <p>🔴 EVACUATE IMMEDIATELY</p>
            <button onclick="closeGlobalWarning()">Acknowledge</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>
</body>
</html>
